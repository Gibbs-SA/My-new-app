<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>PAC-MAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- Landscape warning -->
    <div id="rotate-warning">
      <div class="rotate-icon">&#8635;</div>
      <p>세로 모드로<br>돌려주세요</p>
    </div>

    <!-- Auth screen -->
    <div id="auth-screen" class="screen">
      <div class="auth-card">
        <div class="pac-logo">
          <canvas id="logo-canvas" width="80" height="80"></canvas>
        </div>
        <h1 class="title-text">PAC-MAN</h1>
        <button id="btn-google-login" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right:8px;vertical-align:middle"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google로 로그인
        </button>
        <button id="btn-guest" class="btn btn-secondary">게스트로 플레이</button>
      </div>
    </div>

    <!-- Menu screen -->
    <div id="menu-screen" class="screen hidden">
      <div class="menu-card">
        <h1 class="title-text">PAC-MAN</h1>
        <div id="user-info" class="user-info"></div>
        <button id="btn-play" class="btn btn-primary">PLAY</button>
        <button id="btn-leaderboard-menu" class="btn btn-secondary">LEADERBOARD</button>
        <button id="btn-logout" class="btn btn-ghost hidden">로그아웃</button>
      </div>
    </div>

    <!-- Game container -->
    <div id="game-container" class="hidden">
      <div id="canvas-wrapper">
        <canvas id="game-canvas"></canvas>
        <!-- HUD overlaid on canvas top -->
        <div id="hud">
          <div class="hud-left">
            <span class="hud-label">SCORE</span>
            <span id="hud-score">0</span>
          </div>
          <div class="hud-center">
            <span class="hud-label">HIGH</span>
            <span id="hud-high">0</span>
          </div>
          <div class="hud-right">
            <span class="hud-label">LEVEL</span>
            <span id="hud-level">1</span>
          </div>
        </div>
        <!-- Lives overlaid on canvas bottom -->
        <div id="lives-bar">
          <span id="hud-lives"></span>
        </div>
        <!-- Overlay messages -->
        <div id="overlay-msg" class="overlay-msg hidden"></div>
      </div>
      <!-- D-pad -->
      <div id="dpad">
        <div class="dpad-row">
          <button class="dpad-btn" id="dpad-up" aria-label="Up">▲</button>
        </div>
        <div class="dpad-row dpad-middle">
          <button class="dpad-btn" id="dpad-left" aria-label="Left">◀</button>
          <div class="dpad-center-space"></div>
          <button class="dpad-btn" id="dpad-right" aria-label="Right">▶</button>
        </div>
        <div class="dpad-row">
          <button class="dpad-btn" id="dpad-down" aria-label="Down">▼</button>
        </div>
      </div>
    </div>

    <!-- Game Over screen -->
    <div id="gameover-screen" class="screen hidden">
      <div class="gameover-card">
        <h2 class="title-text" style="color:#ff0000">GAME OVER</h2>
        <p class="score-display">SCORE: <span id="final-score">0</span></p>
        <p class="score-display" id="new-best-msg" style="color:#ffff00;display:none">NEW BEST!</p>
        <button id="btn-play-again" class="btn btn-primary">PLAY AGAIN</button>
        <button id="btn-leaderboard-go" class="btn btn-secondary">LEADERBOARD</button>
        <button id="btn-menu-go" class="btn btn-ghost">MENU</button>
      </div>
    </div>

    <!-- Leaderboard screen -->
    <div id="leaderboard-screen" class="screen hidden">
      <div class="leaderboard-card">
        <h2 class="title-text">TOP 10</h2>
        <ol id="leaderboard-list"></ol>
        <button id="btn-back" class="btn btn-secondary">BACK</button>
      </div>
    </div>

  </div>

  <!-- Firebase SDK v10 modular via CDN ESM shim -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
